<body><div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useEffect } = React;

// ── Constants ────────────────────────────────────────────────────────────────
const CO_DEF = {
  name:'Vantage Precision Components', short:'VPC', sector:'Aerospace & Defense',
  desc:'Precision-engineered structural components for commercial aerospace, defense platforms, and space launch systems.',
  ltmRevenue:487.2, ltmEBITDA:92.1, ltmDA:25.3, ltmCapex:17.8,
  hq:'Cincinnati, OH', founded:1987, employees:'~3,200',
};
const SOFR = 5.30;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "entryMultiple":9.0,"leverageTurns":5.0,"snTurns":1.5,
  "tlbSpreadBps":400,"snRate":7.5,"taxRate":25,
  "revenueGrowthBear":4.5,"revenueGrowthBase":7.5,"revenueGrowthBull":11.0,
  "ebitdaMarginBase":21.5,"ebitdaMarginDelta":1.0,
  "exitMultiple":9.5,"exitYear":5,"scenario":"base",
  "riskFreeRate":4.5,"beta":1.15,"erp":5.5,"costOfDebt":7.5,
  "termGrowthRate":2.5,"dcfExitMultiple":9.5,"dcfDebtWeight":35
}/*EDITMODE-END*/;

// ── Formatters ───────────────────────────────────────────────────────────────
const fM  = (v,d=1)=>{ if(v==null||isNaN(v))return'—'; const neg=v<0,a=Math.abs(v); return`${neg?'(':''}\$${a>=1000?(a/1e3).toFixed(1)+'B':a.toFixed(d)+'M'}${neg?')':''}`; };
const fP  = (v,d=1)=>v==null?'—':`${(v*100).toFixed(d)}%`;
const fX  = (v,d=2)=>v==null?'—':`${v.toFixed(d)}x`;
const fI  = (v)=>v==null?'—':`${(v*100).toFixed(1)}%`;

const iFg = (v)=>v<.15?'#f85149':v<.22?'#d29922':v<.27?'#a8c832':'#3fb950';
const iBg = (v)=>v<.15?'rgba(248,81,73,.18)':v<.22?'rgba(210,153,34,.16)':v<.27?'rgba(63,185,80,.13)':'rgba(63,185,80,.22)';
const mFg = (v)=>v<2?'#f85149':v<2.5?'#d29922':v<3?'#a8c832':'#3fb950';
const mBg = (v)=>v<2?'rgba(248,81,73,.18)':v<2.5?'rgba(210,153,34,.16)':v<3?'rgba(63,185,80,.13)':'rgba(63,185,80,.22)';

// ── LBO Engine ───────────────────────────────────────────────────────────────
function buildLBO(cfg, co) {
  const sc = cfg.scenario;
  const revG  = sc==='bear'?cfg.revenueGrowthBear : sc==='bull'?cfg.revenueGrowthBull : cfg.revenueGrowthBase;
  const mTgt  = (cfg.ebitdaMarginBase + (sc==='bear'?-cfg.ebitdaMarginDelta : sc==='bull'?cfg.ebitdaMarginDelta:0))/100;
  const tx    = cfg.taxRate/100;
  const tlbR  = (SOFR + cfg.tlbSpreadBps/100)/100;
  const snR   = cfg.snRate/100;
  const tlbTurns = Math.max(0, cfg.leverageTurns - cfg.snTurns);
  const entryEV  = co.ltmEBITDA * cfg.entryMultiple;
  const tlbP     = co.ltmEBITDA * tlbTurns;
  const snP      = co.ltmEBITDA * cfg.snTurns;
  const debt0    = tlbP + snP;
  const fees     = entryEV * 0.02;
  const equity   = entryEV - debt0 + fees;
  const entryLev = debt0 / co.ltmEBITDA;
  const baseMgn  = co.ltmEBITDA / co.ltmRevenue;
  const mStep    = (mTgt - baseMgn)/5;
  let tlbBal=tlbP, snBal=snP, prevRev=co.ltmRevenue;
  const proj=[];
  for(let y=1;y<=5;y++){
    const rev  = prevRev*(1+revG/100);
    const mgn  = baseMgn+mStep*y;
    const ebitda=rev*mgn;
    const da   = co.ltmDA*Math.pow(1.03,y);
    const ebit = ebitda-da;
    const tlbI = tlbBal*tlbR, snI=snBal*snR, totI=tlbI+snI;
    const ebt  = ebit-totI;
    const taxes= Math.max(0,ebt*tx);
    const ni   = ebt-taxes;
    const capex= co.ltmCapex*Math.pow(1.02,y);
    const dwc  = (rev-prevRev)*0.015;
    const fcf  = ebitda-totI-taxes-capex-dwc;
    const uFcf = ebitda - Math.max(0,ebitda*tx) - capex - dwc;
    const mand = tlbP*0.01;
    const sweep= Math.max(0,fcf-mand)*0.75;
    const tlbPay=Math.min(tlbBal,mand+sweep);
    tlbBal=Math.max(0,tlbBal-tlbPay);
    proj.push({year:y,rev,ebitda,mgnPct:mgn*100,da,ebit,tlbI,snI,totI,ebt,taxes,ni,capex,dwc,fcf,uFcf,
      tlbBal,snBal,totDebt:tlbBal+snBal,tlbPay,lev:(tlbBal+snBal)/ebitda,gPct:(rev/prevRev-1)*100});
    prevRev=rev;
  }
  const exitP=proj[cfg.exitYear-1];
  const exitEV=exitP.ebitda*cfg.exitMultiple;
  const exitEq=exitEV-exitP.totDebt;
  const moic=exitEq/equity;
  const irr=Math.pow(Math.max(.001,moic),1/cfg.exitYear)-1;
  const rby=proj.map((p,i)=>{const ev=p.ebitda*cfg.exitMultiple,eq=ev-p.totDebt,m=eq/equity,r=Math.pow(Math.max(.001,m),1/(i+1))-1;return{year:i+1,moic:m,irr:r,ev,eq};});
  const eMs=[7.5,8,8.5,9,9.5,10,10.5], xMs=[7,7.5,8,8.5,9,9.5,10,10.5,11];
  const sens=eMs.map(em=>{const emEV=co.ltmEBITDA*em,emD=co.ltmEBITDA*cfg.leverageTurns,emEq=emEV-emD+emEV*.02;
    return xMs.map(xm=>{const xEq=exitP.ebitda*xm-exitP.totDebt,m=xEq/emEq,r=Math.pow(Math.max(.001,m),1/cfg.exitYear)-1;return{irr:r,moic:m};});});
  return{entryEV,tlbP,snP,debt0,fees,equity,entryLev,tlbR,snR,tlbTurns,proj,exitEV,exitEq,moic,irr,rby,eMs,xMs,sens,ltmEBITDA:co.ltmEBITDA,ltmRev:co.ltmRevenue};
}

// ── DCF Engine ───────────────────────────────────────────────────────────────
function buildDCF(cfg, co, proj) {
  const Rf=cfg.riskFreeRate/100, B=cfg.beta, ERP=cfg.erp/100;
  const Kd=cfg.costOfDebt/100, Tx=cfg.taxRate/100, Tg=cfg.termGrowthRate/100;
  const Dw=cfg.dcfDebtWeight/100;
  const Ke=Rf+B*ERP;
  const wacc=(1-Dw)*Ke+Dw*Kd*(1-Tx);
  let pvFCFs=0;
  const pvArr=proj.map((p,i)=>{const pv=p.uFcf/Math.pow(1+wacc,i+1);pvFCFs+=pv;return{...p,pv};});
  const tFcf=proj[4].uFcf*(1+Tg);
  const tvGG=tFcf/(wacc-Tg), tvEM=proj[4].ebitda*cfg.dcfExitMultiple;
  const pvTvGG=tvGG/Math.pow(1+wacc,5), pvTvEM=tvEM/Math.pow(1+wacc,5);
  const evGG=pvFCFs+pvTvGG, evEM=pvFCFs+pvTvEM;
  return{wacc,Ke,Kd_at:Kd*(1-Tx),pvFCFs,pvArr,tvGG,tvEM,pvTvGG,pvTvEM,evGG,evEM,
    implGG:evGG/co.ltmEBITDA, implEM:evEM/co.ltmEBITDA,
    entryEV:cfg.entryMultiple*co.ltmEBITDA};
}

// ── Shared row component ─────────────────────────────────────────────────────
const TR=({label,vals,bold,dim,indent,green,borderTop,hi})=>(
  <tr style={{borderTop:borderTop?'1px solid #21262d':undefined,background:bold?'rgba(255,255,255,.025)':undefined}}>
    <td style={{paddingLeft:indent?26:18,color:dim?'#6e7681':bold?'#e6edf3':'#8b949e',fontWeight:bold?600:400,fontSize:12,whiteSpace:'nowrap'}}>{label}</td>
    {vals.map((v,i)=>(
      <td key={i} style={{fontFamily:'DM Mono,monospace',fontSize:12,color:green?'#3fb950':dim?'#6e7681':bold?'#e6edf3':'#8b949e',fontWeight:bold?500:400,background:hi===i?'rgba(45,125,210,.09)':undefined}}>{v}</td>
    ))}
  </tr>
);

// ── Inputs ───────────────────────────────────────────────────────────────────
function InputsSection({cfg,setCfg,co,setCo}){
  const C=(k,v)=>setCfg(p=>({...p,[k]:parseFloat(v)||0}));
  const O=(k,v)=>setCo(p=>({...p,[k]:parseFloat(v)||0}));
  const N=({k,label,min,max,step,src='cfg'})=>(
    <div><div className="ilabel">{label}</div>
      <input type="number" min={min} max={max} step={step||0.1} value={src==='co'?co[k]:cfg[k]}
        onChange={e=>src==='co'?O(k,e.target.value):C(k,e.target.value)}/>
    </div>
  );
  return(
    <div className="sec">
      <h2 className="sec-title">Deal Inputs</h2>
      <div className="card cp" style={{marginBottom:14}}>
        <div className="igtitle">Company Financials — LTM ($M)</div>
        <div className="irow">
          <N k="ltmRevenue" label="Revenue" min={0} max={10000} step={1} src="co"/>
          <N k="ltmEBITDA"  label="EBITDA"  min={0} max={5000}  step={0.5} src="co"/>
          <N k="ltmDA"      label="D&A"     min={0} max={1000}  step={0.5} src="co"/>
          <N k="ltmCapex"   label="CapEx"   min={0} max={1000}  step={0.5} src="co"/>
        </div>
      </div>
      <div className="card cp" style={{marginBottom:14}}>
        <div className="igtitle">Deal Structure</div>
        <div className="irow">
          <N k="entryMultiple"  label="Entry EV/EBITDA"   min={5}  max={15} step={0.25}/>
          <N k="exitMultiple"   label="Exit EV/EBITDA"    min={5}  max={15} step={0.25}/>
          <N k="exitYear"       label="Exit Year"          min={3}  max={7}  step={1}/>
          <N k="leverageTurns"  label="Total Leverage (x)" min={2}  max={8}  step={0.25}/>
          <N k="snTurns"        label="Senior Notes (x)"   min={0}  max={4}  step={0.25}/>
          <N k="taxRate"        label="Tax Rate (%)"        min={10} max={40} step={1}/>
        </div>
      </div>
      <div className="card cp" style={{marginBottom:14}}>
        <div className="igtitle">Debt Terms</div>
        <div className="irow">
          <N k="tlbSpreadBps"  label="TLB Spread bps (SOFR+)" min={150} max={700} step={25}/>
          <N k="snRate"        label="Senior Notes Rate (%)"   min={4}   max={14}  step={0.25}/>
        </div>
      </div>
      <div className="card cp" style={{marginBottom:14}}>
        <div className="igtitle">Operating Assumptions</div>
        <div className="irow">
          <N k="revenueGrowthBear"  label="Rev Growth Bear (%)"         min={-5} max={20} step={0.5}/>
          <N k="revenueGrowthBase"  label="Rev Growth Base (%)"         min={-5} max={20} step={0.5}/>
          <N k="revenueGrowthBull"  label="Rev Growth Bull (%)"         min={-5} max={20} step={0.5}/>
          <N k="ebitdaMarginBase"   label="EBITDA Margin Target (%)"    min={10} max={35} step={0.5}/>
          <N k="ebitdaMarginDelta"  label="Margin Bear/Bull Variance (%)" min={0} max={5}  step={0.25}/>
        </div>
      </div>
      <div className="card cp">
        <div className="igtitle">DCF / WACC Assumptions</div>
        <div className="irow">
          <N k="riskFreeRate"    label="Risk-Free Rate (%)"      min={1}   max={8}   step={0.1}/>
          <N k="beta"            label="Unlevered Beta"           min={0.5} max={2.5} step={0.05}/>
          <N k="erp"             label="Equity Risk Premium (%)"  min={3}   max={9}   step={0.25}/>
          <N k="costOfDebt"      label="Cost of Debt (%)"         min={3}   max={14}  step={0.25}/>
          <N k="dcfDebtWeight"   label="Target Debt Weight (%)"   min={10}  max={70}  step={5}/>
          <N k="termGrowthRate"  label="Terminal Growth Rate (%)" min={0}   max={5}   step={0.25}/>
          <N k="dcfExitMultiple" label="DCF Exit Multiple (x)"   min={5}   max={15}  step={0.25}/>
        </div>
      </div>
    </div>
  );
}

// ── Overview ─────────────────────────────────────────────────────────────────
function OverviewSection({lbo,dcf,cfg,co}){
  const {proj,moic,irr,entryEV,equity,debt0,entryLev} = lbo;
  const ebs=[co.ltmEBITDA,...proj.map(p=>p.ebitda)];
  const maxE=Math.max(...ebs),minE=Math.min(...ebs)*.92,sW=110,sH=32;
  const pts=ebs.map((v,i)=>`${(i/(ebs.length-1))*sW},${sH-((v-minE)/(maxE-minE))*sH}`).join(' ');
  return(
    <div className="sec">
      <h2 className="sec-title">Deal Overview</h2>
      <div className="card cp" style={{marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span style={{fontSize:15,fontWeight:600,color:'#e6edf3'}}>{co.name}</span>
              <span className="tag tag-b">{co.sector}</span>
              <span className="tag tag-y">LBO</span>

          <TR dim indent label="ECF Sweep (75%)" vals={['—',...proj.map(p=>fM(Math.max(0,p.tlbPay-tlbP*.01)))]}/>

// ── Returns ──────────────────────────────────────────────────────────────────
function ReturnsSection({lbo,cfg}){
  const{proj,equity,irr,moic,exitEV,exitEq,rby,entryEV,debt0,ltmEBITDA}=lbo;
  const ey=cfg.exitYear, ep=proj[ey-1];
  const ebG=(ep.ebitda-ltmEBITDA)*cfg.entryMultiple;
  const mE=ep.ebitda*(cfg.exitMultiple-cfg.entryMultiple);
  const dP=debt0-ep.totDebt;
  const items=[
    {label:'Entry\nEquity',val:equity,type:'start',color:'#2d7dd2'},
    {label:'EBITDA\nGrowth',val:ebG,type:'mid',color:ebG>=0?'#3fb950':'#f85149'},
    {label:'Multiple\nExpansion',val:mE,type:'mid',color:mE>=0?'#3fb950':'#f85149'},
    {label:'Debt\nPaydown',val:dP,type:'mid',color:'#58a6ff'},
    {label:'Exit\nEquity',val:exitEq,type:'end',color:'#3fb950'},
  ];
  const bW=540,bH=120,barW=64,bGap=10;
  let run=equity;
  const bars=items.map(it=>{
    if(it.type==='start')return{...it,base:0,top:it.val};
    if(it.type==='end')  return{...it,base:0,top:it.val};
    const base=run; run+=it.val; return{...it,base,top:run};
  });
  const maxTop=Math.max(...bars.map(b=>b.top))*1.18;
  const sc=bH/maxTop;
  const xOf=i=>16+i*(barW+bGap);
  return(
    <div className="sec">
      <h2 className="sec-title">Returns & IRR</h2>
      <div className="g4">
        {[{l:'IRR',v:fI(irr),s:`Year ${ey} exit`,c:iFg(irr),bg:iBg(irr)},{l:'MOIC',v:fX(moic),s:`Year ${ey} exit`,c:mFg(moic),bg:mBg(moic)},{l:'Entry Equity',v:fM(equity),s:`${fP(equity/entryEV)} of EV`,c:'#e6edf3'},{l:'Exit Equity',v:fM(exitEq),s:`${fX(exitEV/entryEV,1)} EV growth`,c:'#e6edf3'}].map(k=>(
          <div key={k.l} className="kc" style={{background:k.bg||'#161b22'}}><div className="kl">{k.l}</div><div className="kv" style={{color:k.c}}>{k.v}</div><div className="ks">{k.s}</div></div>
        ))}
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="clabel">Returns by Exit Year</div>
        <table><thead><tr><th></th>{rby.map(r=><th key={r.year} style={{color:r.year===ey?'#58a6ff':undefined,background:r.year===ey?'rgba(45,125,210,.08)':undefined}}>Year {r.year}</th>)}</tr></thead>
        <tbody>
          {[{l:'Exit EBITDA',vs:proj.map(p=>fM(p.ebitda))},{l:'Exit EV',vs:proj.map(p=>fM(p.ebitda*cfg.exitMultiple))},{l:'Net Debt',vs:proj.map(p=>fM(p.totDebt))},
            {l:'Equity Proceeds',vs:rby.map(r=>fM(r.eq)),b:true,bt:true},{l:'MOIC',vs:rby.map(r=>fX(r.moic)),b:true,cf:(r)=>mFg(r.moic)},{l:'IRR',vs:rby.map(r=>fI(r.irr)),b:true,cf:(r)=>iFg(r.irr)}
          ].map((row,ri)=>(
            <tr key={ri} style={{borderTop:row.bt?'1px solid #21262d':undefined,background:row.b?'rgba(255,255,255,.02)':undefined}}>
              <td style={{fontSize:12,color:row.b?'#c9d1d9':'#8b949e',fontWeight:row.b?600:400}}>{row.l}</td>
              {(row.cf?rby:proj).map((item,i)=>{
                const isA=(i+1)===ey;
                const fg=row.cf?row.cf(item):(row.b?'#e6edf3':'#8b949e');
                return <td key={i} style={{fontFamily:'DM Mono,monospace',fontSize:12,color:fg,fontWeight:row.b?500:400,background:isA?'rgba(45,125,210,.09)':undefined}}>{row.vs[i]}</td>;
              })}
            </tr>
          ))}
        </tbody></table>
      </div>
      <div className="card">
        <div className="clabel">Sponsor Equity Bridge — Year {ey} ($M)</div>
        <div style={{padding:'0 18px 16px'}}>
          <svg width={bW} height={bH+50} style={{overflow:'visible'}}>
            {bars.map((it,i)=>{
              const x=xOf(i), h=Math.abs(it.top-it.base)*sc, yTop=bH-Math.max(it.top,it.base)*sc;
              const isE=it.type==='end', isS=it.type==='start';
              return(<g key={i}>
                {i>0&&!isE&&<line x1={x} y1={bH-it.base*sc} x2={x-bGap} y2={bH-it.base*sc} stroke="#30363d" strokeDasharray="3 3" strokeWidth={1}/>}
                <rect x={x} y={yTop} width={barW} height={Math.max(h,2)} fill={it.color} rx={3} opacity={.88}/>
                <text x={x+barW/2} y={yTop-6} textAnchor="middle" fontSize={11} fill="#e6edf3" fontFamily="DM Mono" fontWeight="500">
                  {(isS||isE)?fM(it.val,0):`${it.val>=0?'+':''}${fM(it.val,0)}`}
                </text>
                {it.label.split('\n').map((ln,li)=><text key={li} x={x+barW/2} y={bH+20+li*13} textAnchor="middle" fontSize={11} fill="#6e7681">{ln}</text>)}
              </g>);
            })}
          </svg>
        </div>
      </div>
    </div>
  );
}

// ── Sensitivity ──────────────────────────────────────────────────────────────
function SensSection({lbo,cfg}){
  const[metric,setMetric]=useState('irr');
  const{proj,eMs,xMs,sens,equity}=lbo;
  const ey=cfg.exitYear;
  return(
    <div className="sec">
      <h2 className="sec-title">Sensitivity Analysis</h2>
      <div style={{display:'flex',gap:6,marginBottom:13}}>
        {['irr','moic'].map(m=>(
          <button key={m} onClick={()=>setMetric(m)} style={{padding:'4px 14px',borderRadius:6,border:metric===m?'1px solid #2d7dd2':'1px solid #30363d',background:metric===m?'rgba(45,125,210,.15)':'transparent',color:metric===m?'#58a6ff':'#6e7681',fontSize:11,fontWeight:700,cursor:'pointer',textTransform:'uppercase',letterSpacing:'.06em'}}>{m}</button>
        ))}
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="clabel">Entry Multiple × Exit Multiple — Year {ey} exit</div>
        <div style={{overflowX:'auto'}}>
          <table style={{minWidth:580}}>
            <thead><tr><th style={{color:'#484f58'}}>↓ Entry  Exit →</th>{xMs.map(xm=><th key={xm} style={{color:Math.abs(xm-cfg.exitMultiple)<.01?'#58a6ff':undefined,background:Math.abs(xm-cfg.exitMultiple)<.01?'rgba(45,125,210,.08)':undefined}}>{xm.toFixed(1)}x</th>)}</tr></thead>
            <tbody>
              {eMs.map((em,ri)=>(
                <tr key={em}>

                  {xMs.map((xm,ci)=>{const c=sens[ri][ci],isA=Math.abs(em-cfg.entryMultiple)<.01&&Math.abs(xm-cfg.exitMultiple)<.01;

// ── M&A Engine ───────────────────────────────────────────────────────────────
const ACQUIRER = {
  name:'Meridian Aerospace Holdings', short:'MAH',
  revenue:2140, ebitda:385, ebitdaMargin:.18,
  ebit:268, interestExp:32, netIncome:182, eps:4.20, shares:85,
  netDebt:420, evMultiple:10.8, da:58, capex:44,
};

const MA_DEF = {
  offerPremium:32, cashPct:60,
  costSynPct:3.2, revSynM:22,
  integCostY1:42, integCostY2:24,
  synDiscSpread:200,
  ppaTangible:85, ppaIntangible:140, ppaUsefulLife:12,
};

function buildMA(cfg, co, dcf, maC) {
  const txRate       = cfg.taxRate / 100;
  const standaloneEV = dcf.evGG;
  const offerEV      = standaloneEV * (1 + maC.offerPremium/100);
  const premium      = offerEV - standaloneEV;
  const cashConsid   = offerEV * (maC.cashPct/100);
  const stockConsid  = offerEV * (1 - maC.cashPct/100);
  const acqEV        = ACQUIRER.ebitda * ACQUIRER.evMultiple;
  const newShares    = (stockConsid / acqEV) * ACQUIRER.shares;
  const debtFinanced = cashConsid * 0.55;
  const cashFromBS   = cashConsid * 0.45;
  const synDisc      = dcf.wacc + maC.synDiscSpread/100;

  // PPA / Goodwill
  const bookValueTgt   = co.ltmEBITDA * 2.2; // proxy net book value
  const fairValueStepUp= maC.ppaTangible + maC.ppaIntangible;
  const goodwill       = offerEV - bookValueTgt - fairValueStepUp;
  const annualPPAAmort = maC.ppaIntangible / maC.ppaUsefulLife;

  // Synergy ramp: 20/55/80/100/100
  const ramp = [0.20, 0.55, 0.80, 1.00, 1.00];
  const annualCostSyn = co.ltmRevenue * (maC.costSynPct/100);
  const annualRevSyn  = maC.revSynM;
  const annualTotSyn  = annualCostSyn + annualRevSyn;
  const integCosts    = [maC.integCostY1, maC.integCostY2, 0, 0, 0];

  let pvSyn = 0, pvInteg = 0;
  const synRows = ramp.map((r, i) => {
    const grossSyn = annualTotSyn * r;
    const costSyn  = annualCostSyn * r;
    const revSyn   = annualRevSyn * r;
    const integ    = integCosts[i] || 0;
    const netSyn   = grossSyn - integ;
    const netSynAT = netSyn * (1 - txRate);
    const df       = 1 / Math.pow(1 + synDisc, i+1);
    pvSyn   += grossSyn * (1-txRate) * df;
    pvInteg += integ * (1-txRate) * df;
    return { year:i+1, costSyn, revSyn, grossSyn, integ, netSyn, netSynAT, pv: netSynAT*df };
  });
  const pvNetSyn     = pvSyn - pvInteg;
  const valueCreated = pvNetSyn - premium;
  const pvAnnuityFactor = ramp.reduce((s,r,i)=>s+r*(1-txRate)/Math.pow(1+synDisc,i+1),0);
  const breakEvenSyn = premium / pvAnnuityFactor;

  // Pro Forma Income Statement (Year 1 and Year 2)
  const newDebtInt = debtFinanced * (cfg.costOfDebt/100);
  const proForma = [1,2].map(yr => {
    const tgtRev    = co.ltmRevenue * Math.pow(1.075, yr);
    const tgtEBITDA = tgtRev * 0.20;
    const synE      = annualTotSyn * ramp[yr-1];
    const integC    = integCosts[yr-1] || 0;
    const combRev   = ACQUIRER.revenue + tgtRev + (annualRevSyn * ramp[yr-1]);
    const combEBITDA= ACQUIRER.ebitda  + tgtEBITDA + (annualCostSyn * ramp[yr-1]) - integC;
    const combDA    = ACQUIRER.da + co.ltmDA * Math.pow(1.03, yr) + annualPPAAmort;
    const combEBIT  = combEBITDA - combDA;
    const combInt   = ACQUIRER.interestExp + newDebtInt;
    const combEBT   = combEBIT - combInt;
    const combTax   = Math.max(0, combEBT * txRate);
    const combNI    = combEBT - combTax;
    const combShares= ACQUIRER.shares + Math.max(0, newShares);
    const pfEPS     = combNI / combShares;
    const accretion = (pfEPS - ACQUIRER.eps) / ACQUIRER.eps;
    return { yr, combRev, combEBITDA, combDA, combEBIT, combInt, combEBT, combTax, combNI, combShares, pfEPS, accretion, synE, integC };
  });

  // Deal structure sensitivity: cash% × offer premium → Y2 accretion
  const cashPctRows = [20,30,40,50,60,70,80];
  const premCols    = [20,25,30,35,40,45,50];
  const structSens  = cashPctRows.map(cp => premCols.map(pr => {
    const offEV2   = standaloneEV*(1+pr/100);
    const cash2    = offEV2*(cp/100);
    const stock2   = offEV2*(1-cp/100);
    const nShares2 = (stock2/acqEV)*ACQUIRER.shares;
    const debt2    = cash2*0.55;
    const int2     = debt2*(cfg.costOfDebt/100);
    const y2syn    = annualTotSyn*ramp[1];
    const y2int2   = integCosts[1]||0;
    const combNI2  = ACQUIRER.netIncome + co.ltmEBITDA*0.55*0.75 + (y2syn-y2int2-int2)*(1-txRate) - annualPPAAmort*(1-txRate);
    const combS2   = ACQUIRER.shares + Math.max(0,nShares2);
    const pfEPS2   = combNI2/combS2;
    return (pfEPS2 - ACQUIRER.eps)/ACQUIRER.eps;
  }));

  // Value created sensitivity: premium × syn%
  const premRows = [15,20,25,30,35,40,45];
  const synCols  = [1.5,2.0,2.5,3.0,3.5,4.0,4.5];
  const sensMat  = premRows.map(prem => synCols.map(synPct => {
    const offEV2 = standaloneEV*(1+prem/100);
    const prem_  = offEV2 - standaloneEV;
    const synAmt = co.ltmRevenue*(synPct/100) + annualRevSyn;
    const pvS    = ramp.reduce((s,r,i)=>s+synAmt*r*(1-txRate)/Math.pow(1+synDisc,i+1),0);
    return { vc: pvS-prem_, pct:(pvS-prem_)/offEV2 };
  }));

  return {
    standaloneEV, offerEV, premium, cashConsid, stockConsid,
    newShares, debtFinanced, cashFromBS, newDebtInt,
    goodwill, bookValueTgt, fairValueStepUp, annualPPAAmort,
    synRows, pvSyn, pvInteg, pvNetSyn, valueCreated,
    breakEvenSyn, annualCostSyn, annualRevSyn, annualTotSyn,
    proForma, cashPctRows, premCols, structSens,
    premRows, synCols, sensMat, synDisc,
  };
}

  const y2   = proForma[1];

  return (

      <h2 className="sec-title">M&A DCF Analysis</h2>

      {/* Party cards */}
      <div className="g2">
        {[
          { badge:'TGT', name:co.name, role:'Target', bc:'#2d7dd2',
            items:[['LTM Revenue',fM(co.ltmRevenue)],['LTM EBITDA',fM(co.ltmEBITDA)],['Standalone EV',fM(standaloneEV)],['EV/EBITDA',fX(standaloneEV/co.ltmEBITDA)]] },

              <svg width={W} height={H+50} style={{overflow:'visible'}}>
                {synRows.map((r,i)=>{

          <div className="ptabs" style={{margin:0}}>
            {[['pf','Pro Forma'],['bridge','EPS Bridge']].map(([id,l])=>(

            <tbody>
              {[
                {l:'Revenue',        acq:ACQUIRER.revenue, tgt:co.ltmRevenue, adj:ma.annualRevSyn*ramp[0], pf1:proForma[0].combRev, pf2:proForma[1].combRev, b:true},
                {l:'EBITDA',         acq:ACQUIRER.ebitda,  tgt:co.ltmEBITDA,  adj:annualTotSyn*ramp[0]-maC.integCostY1, pf1:proForma[0].combEBITDA, pf2:proForma[1].combEBITDA, b:true, bt:true},

              ].map((row,ri)=>{
                if(row.special==='margins') return(

                const pfColor = yr => yr.accretion>=0?'#3fb950':'#f85149';
                return(
                  <tr key={ri} style={{borderTop:row.bt?'1px solid #21262d':undefined,background:row.b?'rgba(255,255,255,.02)':undefined}}>
                    <td style={{fontSize:12,color:row.b?'#c9d1d9':'#8b949e',fontWeight:row.b?600:400}}>{row.l}</td>

                    <td style={{fontFamily:'DM Mono',fontSize:12,color:row.eps?pfColor(proForma[1]):'#e6edf3',fontWeight:row.b?600:400}}>{fmt(row.pf2)}</td>
                  </tr>
                );

            </tbody>
          </table>
        ):(
          <div style={{padding:'14px 18px'}}>
            {[proForma[0],proForma[1]].map((pf,pi)=>(
              <div key={pi} style={{marginBottom:pi===0?20:0}}>
                <div style={{fontSize:11,fontWeight:600,color:'#8b949e',marginBottom:10}}>Year {pf.yr} EPS Bridge</div>
                {(()=>{
                  const W=500,H=80,bW=52,gap=10;
                  const items=[

                    if(it.type==='start')return{...it,base:0,top:it.v};
                    if(it.type==='end')  return{...it,base:0,top:it.v};
                    const base=run; run+=it.v; return{...it,base,top:run};
                  });
                  const maxTop=Math.max(...bars.map(b=>Math.max(b.top,b.base)))*1.25;
                  const minBot=Math.min(...bars.map(b=>Math.min(b.top,b.base,0)));

                    {premCols.map((p,ci)=>{
                      const v=structSens[ri][ci];
                      const isA=Math.abs(cp-maC.cashPct)<6&&Math.abs(p-maC.offerPremium)<3;
                      const bg=v>=0?`rgba(63,185,80,${Math.min(.28,v*3)})`:`rgba(248,81,73,${Math.min(.24,Math.abs(v)*3)})`;

          </div>
        </div>
      </div>

      {/* Value created heatmap */}
      <div className="card" style={{marginTop:14}}>
        <div className="clabel">Value Created ($M) — Offer Premium (rows) × Cost Synergies % Rev (cols)</div>
        <div style={{overflowX:'auto'}}>

              <th style={{color:'#484f58'}}>↓ Prem  Syn →</th>
              {synCols.map(s=><th key={s} style={{color:Math.abs(s-maC.costSynPct)<.01?'#58a6ff':undefined,background:Math.abs(s-maC.costSynPct)<.01?'rgba(45,125,210,.08)':undefined}}>{s.toFixed(1)}%</th>)}

                  {synCols.map((s,ci)=>{
                    const cell=sensMat[ri][ci];
                    const isA=Math.abs(prem-maC.offerPremium)<.5&&Math.abs(s-maC.costSynPct)<.01;
                    const bg=cell.vc>=0?`rgba(63,185,80,${Math.min(.25,cell.vc/standaloneEV*4)})`:`rgba(248,81,73,${Math.min(.22,Math.abs(cell.vc)/standaloneEV*4)})`;
                    return <td key={s} style={{background:bg,color:cell.vc>=0?'#3fb950':'#f85149',fontFamily:'DM Mono',fontSize:11,outline:isA?'2px solid #2d7dd2':'none',outlineOffset:'-2px',fontWeight:isA?700:400}}>{fM(cell.vc,0)}</td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Debt Paydown Waterfall ────────────────────────────────────────────────────
function WaterfallSection({lbo, cfg}){
  const {proj, tlbP, snP, debt0} = lbo;
  // Build annual cash allocation: FCF → mandatory amort → ECF sweep → remaining
  const years = proj.map((p, i) => {
    const prevTlb = i === 0 ? tlbP : proj[i-1].tlbBal;
    const mand = Math.min(prevTlb, tlbP * 0.01);
    const sweep = Math.max(0, p.tlbPay - mand);
    const remaining = p.fcf - p.tlbPay; // leftover after all debt service
    return { year: p.year, fcf: p.fcf, interest: p.totI, taxes: p.taxes, capex: p.capex, dwc: p.dwc,
      mand, sweep, remaining: Math.max(0, remaining),
      ebitda: p.ebitda, tlbBal: p.tlbBal, snBal: p.snBal };
  });

  const W = 760, H = 160, bW = 38, bGap = 8;
  const allVals = years.flatMap(y => [y.interest, y.taxes, y.capex, y.mand, y.sweep, y.remaining]);
  const maxV = Math.max(...allVals, 1);
  const sc = H / maxV;
  const segments = [
    {key:'interest', label:'Interest',  color:'#f85149'},
    {key:'taxes',    label:'Taxes',     color:'#d29922'},
    {key:'capex',    label:'CapEx',     color:'#8b949e'},
    {key:'mand',     label:'Mand Amort',color:'#58a6ff'},
    {key:'sweep',    label:'ECF Sweep', color:'#2d7dd2'},
    {key:'remaining',label:'Cash Accum',color:'#3fb950'},
  ];
  const xOf = (yi, si) => 20 + yi * (segments.length * (bW + 2) + bGap * 2) + si * (bW + 2);

  return (
    <div className="sec">
      <h2 className="sec-title">Debt Paydown Waterfall</h2>
      <div className="card" style={{marginBottom:14}}>
        <div className="clabel">Annual FCF Allocation ($M)</div>
        <div style={{padding:'0 18px 18px', overflowX:'auto'}}>
          <svg width={W} height={H + 60} style={{overflow:'visible', minWidth:600}}>
            {years.map((y, yi) => {
              const xStart = xOf(yi, 0);
              return (
                <g key={yi}>
                  <text x={xStart + (segments.length * (bW+2))/2 - 6} y={H + 48} textAnchor="middle" fontSize={11} fill="#6e7681">Y{y.year}</text>
                  <text x={xStart + (segments.length * (bW+2))/2 - 6} y={H + 60} textAnchor="middle" fontSize={10} fill="#484f58" fontFamily="DM Mono">{(y.fcf).toFixed(0)}M</text>
                  {segments.map((seg, si) => {
                    const val = y[seg.key];
                    const h = Math.max(val * sc, val > 0 ? 1 : 0);
                    const x = xOf(yi, si);
                    return (
                      <g key={si}>
                        <rect x={x} y={H - h} width={bW} height={h} fill={seg.color} rx={2} opacity={0.85}/>
                        {h > 14 && <text x={x + bW/2} y={H - h/2 + 4} textAnchor="middle" fontSize={9} fill="#fff" fontFamily="DM Mono" opacity={0.9}>{val.toFixed(0)}</text>}
                      </g>
                    );
                  })}
                </g>
              );
            })}
            {/* Legend */}
            {segments.map((seg, i) => (
              <g key={i}>
                <rect x={20 + i * 105} y={H + 20} width={9} height={9} fill={seg.color} rx={2}/>
                <text x={33 + i * 105} y={H + 28} fontSize={10} fill="#6e7681">{seg.label}</text>
              </g>
            ))}
          </svg>
        </div>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="clabel">Debt Paydown Detail ($M)</div>
        <table>
          <thead><tr><th>($M)</th><th>Entry</th>{proj.map(p=><th key={p.year}>Y{p.year}</th>)}</tr></thead>
          <tbody>
            <TR bold label="EBITDA"             vals={['—', ...proj.map(p=>fM(p.ebitda))]}/>
            <TR dim indent label="(–) Interest" vals={['—', ...proj.map(p=>fM(p.totI))]}/>
            <TR dim indent label="(–) Taxes"    vals={['—', ...proj.map(p=>fM(p.taxes))]}/>
            <TR dim indent label="(–) CapEx"    vals={['—', ...proj.map(p=>fM(p.capex))]}/>
            <TR dim indent label="(–) Δ WC"     vals={['—', ...proj.map(p=>fM(p.dwc))]}/>
            <TR bold green borderTop label="Free Cash Flow" vals={['—', ...proj.map(p=>fM(p.fcf))]}/>
            <TR borderTop label="Mandatory Amort (1%)" vals={[fM(tlbP*0.01), ...proj.map(p=>fM(Math.min(p.tlbPay, tlbP*0.01)))]}/>
            <TR label="ECF Sweep (75%)"          vals={['—', ...proj.map(p=>fM(Math.max(0, p.tlbPay - tlbP*0.01)))]}/>
            <TR bold borderTop label="Total TLB Paydown" vals={['—', ...proj.map(p=>fM(p.tlbPay))]}/>
            <TR borderTop bold label="TLB Balance" vals={[fM(tlbP), ...proj.map(p=>fM(p.tlbBal))]}/>
            <TR bold label="SN Balance"           vals={[fM(snP),  ...proj.map(p=>fM(p.snBal))]}/>
            <TR bold borderTop label="Total Debt" vals={[fM(debt0), ...proj.map(p=>fM(p.totDebt))]}/>
            <TR dim label="Debt Paid Down"        vals={['—', ...proj.map(p=>fM(debt0 - p.totDebt))]}/>
            <TR dim label="% of Entry Debt Repaid" vals={['—', ...proj.map(p=>fP((debt0-p.totDebt)/debt0))]}/>
          </tbody>
        </table>
      </div>

      <div className="card cp">
        <div className="igtitle">Cumulative Debt Reduction</div>
        {(() => {
          const W2 = 560, H2 = 90;
          const totals = [{label:'Entry', val:debt0}, ...proj.map(p=>({label:`Y${p.year}`, val:p.totDebt}))];
          const maxD = debt0;
          const pts = totals.map((t,i)=>`${(i/(totals.length-1))*W2},${H2 - (t.val/maxD)*H2}`).join(' ');
          return (
            <svg width={W2} height={H2+30} style={{overflow:'visible'}}>
              <polyline points={pts} fill="none" stroke="#f85149" strokeWidth={2} strokeLinejoin="round" strokeDasharray="5 3"/>
              {totals.map((t,i)=>{
                const x=(i/(totals.length-1))*W2, y=H2-(t.val/maxD)*H2;
                return (<g key={i}>
                  <circle cx={x} cy={y} r={4} fill={i===0?'#f85149':'#2d7dd2'}/>
                  <text x={x} y={y-8} textAnchor="middle" fontSize={10} fill="#8b949e" fontFamily="DM Mono">{fM(t.val,0)}</text>
                  <text x={x} y={H2+18} textAnchor="middle" fontSize={10} fill="#6e7681">{t.label}</text>
                </g>);
              })}
              <line x1={0} y1={H2} x2={W2} y2={H2} stroke="#21262d" strokeWidth={1}/>
            </svg>
          );
        })()}
      </div>
    </div>
  );
}

// ── Public Comps ──────────────────────────────────────────────────────────────
const DEFAULT_COMPS = [
  { name:'TransDigm Group',   ticker:'TDG',  ev:30400, ebitda:2280, rev:6890,  evEbitda:null, evRev:null },
  { name:'Heico Corporation', ticker:'HEI',  ev:22100, ebitda:1010, rev:3700,  evEbitda:null, evRev:null },
  { name:'Curtiss-Wright',    ticker:'CW',   ev:8200,  ebitda:510,  rev:3100,  evEbitda:null, evRev:null },
  { name:'Woodward',          ticker:'WWD',  ev:5600,  ebitda:360,  rev:2900,  evEbitda:null, evRev:null },
  { name:'Moog Inc.',         ticker:'MOG.A',ev:3800,  ebitda:280,  rev:3300,  evEbitda:null, evRev:null },
];

function CompsSection({lbo, dcf, cfg, co}){
  const [comps, setComps] = useState(() => DEFAULT_COMPS.map(c=>({...c, evEbitda:+(c.ev/c.ebitda).toFixed(1), evRev:+(c.ev/c.rev).toFixed(2)})));
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newComp, setNewComp] = useState({name:'',ticker:'',ev:'',ebitda:'',rev:''});

  const upd = (i,k,v) => setComps(prev => prev.map((c,ci)=>{
    if(ci!==i)return c;
    const updated = {...c,[k]:parseFloat(v)||0};
    return {...updated, evEbitda:+(updated.ev/updated.ebitda).toFixed(1), evRev:+(updated.ev/updated.rev).toFixed(2)};
  }));
  const del = (i) => setComps(prev=>prev.filter((_,ci)=>ci!==i));
  const addComp = () => {
    if(!newComp.name||!newComp.ev||!newComp.ebitda)return;
    const ev=parseFloat(newComp.ev), eb=parseFloat(newComp.ebitda), rv=parseFloat(newComp.rev)||1;
    setComps(prev=>[...prev,{name:newComp.name,ticker:newComp.ticker.toUpperCase(),ev,ebitda:eb,rev:rv,evEbitda:+(ev/eb).toFixed(1),evRev:+(ev/rv).toFixed(2)}]);
    setNewComp({name:'',ticker:'',ev:'',ebitda:'',rev:''});
    setShowAdd(false);
  };

  const evEbitdas = comps.map(c=>c.evEbitda).filter(v=>v>0&&isFinite(v));
  const medEE  = [...evEbitdas].sort((a,b)=>a-b)[Math.floor(evEbitdas.length/2)] || 0;
  const meanEE = evEbitdas.reduce((s,v)=>s+v,0) / (evEbitdas.length||1);
  const minEE  = Math.min(...evEbitdas);
  const maxEE  = Math.max(...evEbitdas);

  const implEV_med  = co.ltmEBITDA * medEE;
  const implEV_mean = co.ltmEBITDA * meanEE;
  const entryEV     = lbo.entryEV;

  // Football field data
  const ffMin = Math.min(implEV_med*.85, dcf.evGG*.85, entryEV*.85);
  const ffMax = Math.max(implEV_mean*1.15, dcf.evGG*1.15, entryEV*1.15, co.ltmEBITDA*maxEE*1.05);
  const ffW   = 440;
  const toX   = v => Math.max(0, Math.min(ffW, ((v-ffMin)/(ffMax-ffMin))*ffW));

  return (
    <div className="sec">
      <h2 className="sec-title">Public Comps</h2>

      {/* Stats bar */}
      <div className="g4" style={{marginBottom:14}}>
        {[
          {l:'Median EV/EBITDA', v:fX(medEE),  s:`${comps.length} comps`},
          {l:'Mean EV/EBITDA',   v:fX(meanEE), s:`Range: ${fX(minEE)} – ${fX(maxEE)}`},
          {l:'Implied EV (Median)', v:fM(implEV_med),  s:`vs entry ${fM(entryEV)}`},
          {l:'Entry vs Median',  v:fP((entryEV-implEV_med)/implEV_med), s:entryEV>implEV_med?'premium to comps':'discount to comps'},
        ].map(k=>(
          <div key={k.l} className="kc"><div className="kl">{k.l}</div><div className="kv" style={{fontSize:17}}>{k.v}</div><div className="ks">{k.s}</div></div>
        ))}
      </div>

      {/* Comps table */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 18px 9px'}}>
          <span style={{fontSize:10,fontWeight:700,color:'#6e7681',textTransform:'uppercase',letterSpacing:'.07em'}}>Comparable Companies ($M)</span>
          <button onClick={()=>setShowAdd(s=>!s)} style={{padding:'4px 12px',borderRadius:5,border:'1px solid #30363d',background:showAdd?'rgba(45,125,210,.15)':'transparent',color:showAdd?'#58a6ff':'#6e7681',fontSize:10,fontWeight:600,cursor:'pointer',textTransform:'uppercase',letterSpacing:'.05em'}}>
            {showAdd?'✕ Cancel':'+ Add Comp'}
          </button>
        </div>
        {showAdd && (
          <div style={{margin:'0 18px 12px',padding:'12px 14px',background:'#0d1117',borderRadius:7,display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr auto',gap:8,alignItems:'end'}}>
            {[{k:'name',ph:'Company Name'},{k:'ticker',ph:'Ticker'},{k:'ev',ph:'EV ($M)'},{k:'ebitda',ph:'EBITDA ($M)'},{k:'rev',ph:'Revenue ($M)'}].map(f=>(
              <div key={f.k}>
                <div className="ilabel">{f.ph}</div>
                <input type={f.k==='name'||f.k==='ticker'?'text':'number'} placeholder={f.ph} value={newComp[f.k]}
                  onChange={e=>setNewComp(p=>({...p,[f.k]:e.target.value}))}
                  style={{background:'#161b22',border:'1px solid #30363d',color:'#e6edf3',borderRadius:5,padding:'5px 8px',fontFamily:'DM Mono',fontSize:12,width:'100%',outline:'none'}}/>
              </div>
            ))}
            <button onClick={addComp} style={{padding:'6px 14px',borderRadius:5,border:'none',background:'#2d7dd2',color:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>Add</button>
          </div>
        )}
        <table>
          <thead>
            <tr>
              <th>Company</th><th>Ticker</th>
              <th>EV ($M)</th><th>EBITDA ($M)</th><th>Revenue ($M)</th>
              <th>EV/EBITDA</th><th>EV/Rev</th><th></th>
            </tr>
          </thead>
          <tbody>
            {comps.map((c,i)=>(
              <tr key={i} style={{borderTop:'1px solid #21262d'}}>
                <td style={{fontSize:12,color:'#c9d1d9',fontWeight:500}}>
                  {editing===i
                    ? <input type="text" value={c.name} onChange={e=>upd(i,'name',e.target.value)}
                        style={{background:'#0d1117',border:'1px solid #2d7dd2',color:'#e6edf3',borderRadius:4,padding:'3px 6px',fontSize:12,width:160}}/>
                    : c.name}
                </td>
                <td style={{fontFamily:'DM Mono',fontSize:11,color:'#6e7681'}}>{c.ticker}</td>
                {['ev','ebitda','rev'].map(k=>(
                  <td key={k} style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e'}}>
                    {editing===i
                      ? <input type="number" value={c[k]} onChange={e=>upd(i,k,e.target.value)}
                          style={{background:'#0d1117',border:'1px solid #2d7dd2',color:'#e6edf3',borderRadius:4,padding:'3px 6px',fontSize:12,width:80,fontFamily:'DM Mono'}}/>
                      : fM(c[k],0)}
                  </td>
                ))}
                <td style={{fontFamily:'DM Mono',fontSize:12,color:'#e6edf3',fontWeight:500}}>{fX(c.evEbitda)}</td>
                <td style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e'}}>{fX(c.evRev)}</td>
                <td style={{textAlign:'right',paddingRight:12}}>
                  <button onClick={()=>setEditing(editing===i?null:i)} style={{marginRight:6,padding:'2px 8px',borderRadius:4,border:'1px solid #30363d',background:'transparent',color:'#6e7681',fontSize:10,cursor:'pointer'}}>{editing===i?'Done':'Edit'}</button>
                  <button onClick={()=>del(i)} style={{padding:'2px 8px',borderRadius:4,border:'1px solid #30363d',background:'transparent',color:'#6e7681',fontSize:10,cursor:'pointer'}}>✕</button>
                </td>
              </tr>
            ))}
            {/* Summary row */}
            <tr style={{borderTop:'2px solid #30363d',background:'rgba(255,255,255,.025)'}}>
              <td style={{fontSize:11,fontWeight:700,color:'#8b949e',paddingLeft:18}} colSpan={5}>Median</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#58a6ff',fontWeight:700}}>{fX(medEE)}</td>
              <td colSpan={2}/>
            </tr>
            <tr style={{background:'rgba(255,255,255,.015)'}}>
              <td style={{fontSize:11,fontWeight:700,color:'#8b949e',paddingLeft:18}} colSpan={5}>Mean</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e',fontWeight:600}}>{fX(meanEE)}</td>
              <td colSpan={2}/>
            </tr>
            {/* VPC row */}
            <tr style={{borderTop:'1px solid #21262d',background:'rgba(45,125,210,.06)'}}>
              <td style={{fontSize:12,fontWeight:700,color:'#58a6ff',paddingLeft:18}}>{co.short} (LTM)</td>
              <td style={{fontFamily:'DM Mono',fontSize:11,color:'#484f58'}}>—</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#58a6ff',fontWeight:600}}>{fM(entryEV,0)}</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e'}}>{fM(co.ltmEBITDA,0)}</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e'}}>{fM(co.ltmRevenue,0)}</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#58a6ff',fontWeight:700}}>{fX(cfg.entryMultiple)}</td>
              <td style={{fontFamily:'DM Mono',fontSize:12,color:'#8b949e'}}>{fX(entryEV/co.ltmRevenue)}</td>
              <td/>
            </tr>
          </tbody>
        </table>
      </div>

      {/* Benchmarking football field */}
      <div className="card cp">
        <div className="igtitle">Valuation Benchmarking — EV ($M)</div>
        {[
          {l:`Comps Range (${fX(minEE)} – ${fX(maxEE)})`, lo:co.ltmEBITDA*minEE, hi:co.ltmEBITDA*maxEE, base:implEV_med, c:'#58a6ff'},
          {l:`DCF Gordon Growth`,                          lo:dcf.evGG*.9,         hi:dcf.evGG*1.1,       base:dcf.evGG,   c:'#3fb950'},
          {l:`Entry Price (${fX(cfg.entryMultiple)} entry)`, lo:entryEV*.97,       hi:entryEV*1.03,       base:entryEV,    c:'#d29922'},
        ].map((s,i)=>(
          <div key={i} style={{marginBottom:18}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:11,color:'#8b949e'}}>{s.l}</span>
              <span style={{fontFamily:'DM Mono',fontSize:11,color:s.c}}>{fM(s.lo,0)} — {fM(s.hi,0)}</span>
            </div>
            <div style={{position:'relative',height:22,background:'#0d1117',borderRadius:4}}>
              <div style={{position:'absolute',left:`${(toX(s.lo)/ffW)*100}%`,width:`${((toX(s.hi)-toX(s.lo))/ffW)*100}%`,top:0,height:'100%',background:s.c,borderRadius:4,opacity:.7}}/>
              <div style={{position:'absolute',left:`${(toX(s.base)/ffW)*100}%`,top:0,width:2,height:'100%',background:'#fff',opacity:.9}}/>
            </div>
          </div>
        ))}
        <div style={{borderTop:'1px solid #21262d',paddingTop:10,display:'flex',gap:24,flexWrap:'wrap'}}>
          {[
            {l:'Comps Median Implied EV', v:fM(implEV_med),  c:'#58a6ff'},
            {l:'Comps Mean Implied EV',   v:fM(implEV_mean), c:'#8b949e'},
            {l:'Entry Price',             v:fM(entryEV),     c:'#d29922'},
            {l:'Premium to Comps Median', v:fP((entryEV-implEV_med)/implEV_med), c:entryEV>implEV_med?'#f85149':'#3fb950'},
          ].map(k=>(
            <div key={k.l}><div style={{fontSize:9,color:'#484f58',textTransform:'uppercase',letterSpacing:'.05em'}}>{k.l}</div><div style={{fontFamily:'DM Mono',fontSize:13,color:k.c,fontWeight:600,marginTop:3}}>{k.v}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Tweaks Panel ─────────────────────────────────────────────────────────────
function TweaksPanel({cfg,setCfg,visible}){
  if(!visible)return null;
  const upd=(k,v)=>{setCfg(p=>({...p,[k]:v}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');};
  const Sl=({label,k,min,max,step,fmt})=>(
    <div style={{marginBottom:13}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:10,color:'#8b949e',textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</span>
        <span style={{fontSize:11,fontFamily:'DM Mono',color:'#e6edf3',fontWeight:500}}>{fmt?fmt(cfg[k]):cfg[k]}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={cfg[k]} onChange={e=>upd(k,parseFloat(e.target.value))}/>
    </div>
  );
  return(
    <div style={{position:'fixed',bottom:20,right:20,width:272,background:'#161b22',border:'1px solid #30363d',borderRadius:12,padding:18,zIndex:200,boxShadow:'0 16px 48px rgba(0,0,0,.6)'}}>
      <div style={{fontSize:10,fontWeight:700,color:'#6e7681',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:13}}>Tweaks</div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:'#6e7681',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:7}}>Scenario</div>
        <div style={{display:'flex',gap:5}}>
          {[['bear','#f85149'],['base','#2d7dd2'],['bull','#3fb950']].map(([s,col])=>(
            <button key={s} onClick={()=>upd('scenario',s)} style={{flex:1,padding:'5px 0',borderRadius:5,border:cfg.scenario===s?`1px solid ${col}`:'1px solid #30363d',background:cfg.scenario===s?`${col}22`:'transparent',color:cfg.scenario===s?col:'#6e7681',cursor:'pointer',fontSize:11,fontWeight:700,textTransform:'capitalize'}}>{s}</button>
          ))}
        </div>
      </div>
      <div style={{borderTop:'1px solid #21262d',paddingTop:13}}>
        <Sl label="Entry Multiple" k="entryMultiple" min={6} max={13} step={.25} fmt={v=>`${v.toFixed(2)}x`}/>
        <Sl label="Exit Multiple"  k="exitMultiple"  min={6} max={13} step={.25} fmt={v=>`${v.toFixed(2)}x`}/>
        <Sl label="Exit Year"      k="exitYear"       min={3} max={7}  step={1}   fmt={v=>`Year ${v}`}/>
        <Sl label="Total Leverage" k="leverageTurns"  min={3} max={7}  step={.25} fmt={v=>`${v.toFixed(2)}x`}/>
        <Sl label="Base Rev Growth" k="revenueGrowthBase" min={2} max={15} step={.5} fmt={v=>`${v.toFixed(1)}%`}/>
        <Sl label="Risk-Free Rate" k="riskFreeRate"   min={2} max={7}  step={.1}  fmt={v=>`${v.toFixed(1)}%`}/>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const NAV=[
  {id:'inputs',   label:'Inputs',          icon:'⚙', group:'Setup'},
  {id:'overview', label:'Overview',         icon:'◈', group:'LBO'},
  {id:'entry',    label:'Entry & Sources',  icon:'⊕', group:'LBO'},
  {id:'proj',     label:'Projections',      icon:'↗', group:'LBO'},
  {id:'debt',     label:'Debt Schedule',    icon:'≡', group:'LBO'},
  {id:'returns',  label:'Returns & IRR',    icon:'◎', group:'LBO'},
  {id:'sens',     label:'Sensitivity',      icon:'⊞', group:'LBO'},
  {id:'waterfall',label:'Debt Waterfall',   icon:'⬇', group:'LBO'},
  {id:'dcf',      label:'DCF Analysis',     icon:'◇', group:'DCF'},
  {id:'scenarios',label:'Scenario Compare', icon:'≈', group:'DCF'},
  {id:'comps',    label:'Public Comps',     icon:'⊜', group:'DCF'},
  {id:'ma',       label:'M&A DCF',          icon:'⊗', group:'M&A'},
];
const GROUPS=[...new Set(NAV.map(n=>n.group))];

function App(){
  const[cfg,setCfg]=useState(()=>{try{return{...TWEAK_DEFAULTS,...JSON.parse(localStorage.getItem('lbo_v3')||'{}')};}catch{return TWEAK_DEFAULTS;}});
  const[co,setCo]=useState(CO_DEF);
  const[maC,setMaC]=useState(MA_DEF);
  const[nav,setNav]=useState('overview');
  const[tweaks,setTweaks]=useState(false);

  const lbo=useMemo(()=>buildLBO(cfg,co),[cfg,co]);
  const dcf=useMemo(()=>buildDCF(cfg,co,lbo.proj),[cfg,co,lbo.proj]);

  useEffect(()=>{localStorage.setItem('lbo_v3',JSON.stringify(cfg));},[cfg]);
  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')  setTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const handleReset=()=>{
    if(window.confirm('Reset all inputs to defaults?')){
      setCfg(TWEAK_DEFAULTS);
      setCo(CO_DEF);
      setMaC(MA_DEF);
      localStorage.removeItem('lbo_v3');
    }
  };

  const sections={
    inputs:   <InputsSection cfg={cfg} setCfg={setCfg} co={co} setCo={setCo}/>,
    overview: <OverviewSection lbo={lbo} dcf={dcf} cfg={cfg} co={co}/>,
    entry:    <EntrySection lbo={lbo} cfg={cfg}/>,
    proj:     <ProjSection lbo={lbo} co={co}/>,
    debt:     <DebtSection lbo={lbo} cfg={cfg}/>,
    returns:  <ReturnsSection lbo={lbo} cfg={cfg}/>,
    sens:     <SensSection lbo={lbo} cfg={cfg}/>,
    waterfall:<WaterfallSection lbo={lbo} cfg={cfg}/>,
    dcf:      <DCFSection dcf={dcf} lbo={lbo} cfg={cfg} co={co}/>,
    scenarios:<ScenSection cfg={cfg} co={co}/>,
    comps:    <CompsSection lbo={lbo} dcf={dcf} cfg={cfg} co={co}/>,
    ma:       <MASection cfg={cfg} co={co} dcf={dcf} maC={maC} setMaC={setMaC}/>,
  };

  return(<>
    <div className="sidebar">
      <div className="sidebar-top">
        <div className="co-badge">
          <div className="co-icon">{co.short||'VPC'}</div>
          <div><div className="co-name">{co.name}</div><div className="co-sub">{co.sector}</div></div>
        </div>
        <div className="scen-row">
          {['bear','base','bull'].map(s=>(
            <button key={s} className={`scen-btn ${s} ${cfg.scenario===s?'active':''}`} onClick={()=>setCfg(p=>({...p,scenario:s}))}>{s}</button>
          ))}
        </div>
      </div>
      <div className="sidebar-nav">
        {GROUPS.map(g=>(
          <div key={g}>
            <div className="nav-group-label">{g}</div>
            {NAV.filter(n=>n.group===g).map(n=>(
              <button key={n.id} className={`nav-item ${nav===n.id?'active':''}`} onClick={()=>setNav(n.id)}>
                <span className="nav-icon">{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        ))}
      </div>
      <div className="sidebar-kpis">
        {[{l:'IRR',v:fI(lbo.irr),c:iFg(lbo.irr)},{l:'MOIC',v:fX(lbo.moic),c:mFg(lbo.moic)},{l:'WACC',v:fP(dcf.wacc),c:'#8b949e'},{l:'DCF EV',v:fM(dcf.evGG),c:'#8b949e'}].map(k=>(
          <div key={k.l} className="mini-kpi"><span className="mkl">{k.l}</span><span className="mkv" style={{color:k.c}}>{k.v}</span></div>
        ))}
        <button onClick={handleReset} style={{marginTop:10,width:'100%',padding:'5px 0',borderRadius:5,border:'1px solid #30363d',background:'transparent',color:'#484f58',fontSize:10,fontWeight:600,cursor:'pointer',textTransform:'uppercase',letterSpacing:'.06em',transition:'all .12s'}}
          onMouseEnter={e=>{e.target.style.borderColor='#f85149';e.target.style.color='#f85149';}}
          onMouseLeave={e=>{e.target.style.borderColor='#30363d';e.target.style.color='#484f58';}}>
          ↺ Reset Inputs
        </button>
      </div>
    </div>
    <div className="main">{sections[nav]}</div>
    <TweaksPanel cfg={cfg} setCfg={setCfg} visible={tweaks}/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
